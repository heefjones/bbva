<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draft Order Theme Samples</title>
    <style>
      :root {
        --bg1: #f2f6ee;
        --bg2: #f8fbf7;
        --ink: #12211a;
        --muted: #4f6358;
        --line: #d6e2d8;
        --accent: #0f7d5f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 6% 10%, rgba(0, 127, 95, 0.12) 0, transparent 34%),
          radial-gradient(circle at 92% 18%, rgba(0, 162, 255, 0.12) 0, transparent 32%),
          linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 100%);
      }

      .shell {
        width: min(1520px, 96vw);
        margin: 0 auto;
        padding: 1rem 0.85rem 1.2rem;
        display: grid;
        gap: 0.75rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 2vw, 1.85rem);
      }

      .subtle {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .toolbar {
        display: grid;
        gap: 0.5rem;
      }

      .sample-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.45rem;
      }

      .sample-link {
        text-decoration: none;
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.45rem 0.55rem;
        text-align: center;
        font-size: 0.84rem;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.72);
        transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }

      .sample-link:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        background: #ffffff;
      }

      .sample-link.active {
        border-color: var(--accent);
        background: #ffffff;
        box-shadow: 0 0 0 2px rgba(15, 125, 95, 0.2);
      }

      .preview-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
      }

      .preview-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.7rem;
        padding: 0.5rem 0.65rem;
        border-bottom: 1px solid var(--line);
        background: #f8fbf8;
        font-size: 0.82rem;
      }

      #currentLabel {
        color: var(--muted);
        font-weight: 700;
      }

      #openTab {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      iframe {
        width: 100%;
        height: calc(100vh - 225px);
        min-height: 560px;
        border: 0;
        display: block;
        background: #fff;
      }

      @media (max-width: 820px) {
        iframe {
          height: calc(100vh - 270px);
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Draft Order Theme Samples</h1>
        <p class="subtle">Pick a sample below to preview it instantly. Use Open in New Tab for a full-page look.</p>
      </header>

      <section class="toolbar">
        <div class="sample-grid" id="sampleGrid">
          <a class="sample-link active" href="sample_01.html" data-sample="sample_01.html">Sample 01</a>
          <a class="sample-link" href="sample_02.html" data-sample="sample_02.html">Sample 02</a>
          <a class="sample-link" href="sample_03.html" data-sample="sample_03.html">Sample 03</a>
          <a class="sample-link" href="sample_04.html" data-sample="sample_04.html">Sample 04</a>
          <a class="sample-link" href="sample_05.html" data-sample="sample_05.html">Sample 05</a>
          <a class="sample-link" href="sample_06.html" data-sample="sample_06.html">Sample 06</a>
          <a class="sample-link" href="sample_07.html" data-sample="sample_07.html">Sample 07</a>
          <a class="sample-link" href="sample_08.html" data-sample="sample_08.html">Sample 08</a>
          <a class="sample-link" href="sample_09.html" data-sample="sample_09.html">Sample 09</a>
          <a class="sample-link" href="sample_10.html" data-sample="sample_10.html">Sample 10</a>
        </div>
      </section>

      <section class="preview-wrap">
        <div class="preview-header">
          <span id="currentLabel">Now Viewing: sample_01.html</span>
          <a id="openTab" href="sample_01.html" target="_blank" rel="noopener noreferrer">Open in New Tab</a>
        </div>
        <iframe id="previewFrame" src="sample_01.html" title="Draft Order sample preview"></iframe>
      </section>
    </main>

    <script>
      const links = Array.from(document.querySelectorAll('.sample-link'));
      const frame = document.getElementById('previewFrame');
      const label = document.getElementById('currentLabel');
      const openTab = document.getElementById('openTab');

      links.forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const href = link.getAttribute('data-sample');
          if (!href) {
            return;
          }

          frame.src = href;
          label.textContent = `Now Viewing: ${href}`;
          openTab.href = href;

          links.forEach((item) => item.classList.remove('active'));
          link.classList.add('active');
        });
      });
    </script>
  </body>
</html>
